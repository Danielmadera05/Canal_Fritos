{% extends 'admin/admin_base.html' %}

{% block content %}

<h2 class="mb-4">Gestión de Tiendas</h2>

<div class="mb-3">
    <a href="/admin/tiendas/nueva" class="btn btn-success">
        + Nueva tienda
    </a>
</div>

<table class="table table-bordered">

    <thead>
        <tr>
            <th>ID</th>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Dirección</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        {% for tienda in tiendas %}
        <tr>
            <td>{{ tienda.tie_id }}</td>
            <td>
                <img src="{{ url_for('static', filename='uploads/' + tienda.tie_imagen) }}" width="80">
            </td>
            <td>{{ tienda.tie_nombre }}</td>
            <td>{{ tienda.tie_direccion }}</td>
            <td>
                <a href="/admin/tiendas/editar/{{ tienda.tie_id }}" class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a href="/admin/tiendas/eliminar/{{ tienda.tie_id }}" class="btn btn-danger btn-sm" onclick="return confirm('¿Deseas eliminar esta tienda?')">
                    Eliminar
                </a>
            </td>
        </tr>

        {% endfor %}
    </tbody>
</table>
{% endblock %}
