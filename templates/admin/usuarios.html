{% extends 'admin/admin_base.html' %}

{% block content %}

<h2 class="mb-4">Gestión de Usuarios</h2>

<form method="GET" class="mb-4">
    <div class="row">
        <div class="col-md-6">
            <input class="form-control" type="text" name="buscar" value="{{ busqueda }}" placeholder="Buscar usuario por nombre">
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">
                Buscar
            </button>
        </div>
    </div>
</form>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        {% for usuario in usuarios %}
        <tr>
            <td>{{ usuario.cli_id }}</td>
            <td>{{ usuario.cli_nombre }}</td>
            <td>{{ usuario.cli_email }}</td>
            <td>
                <a href="/admin/usuarios/ver/{{ usuario.cli_id }}" class="btn btn-info btn-sm">
                    Ver
                </a>

                <a href="/admin/usuarios/eliminar/{{ usuario.cli_id }}" class="btn btn-danger btn-sm" onclick="return confirm('¿Deseas eliminar este usuario?')">
                    Eliminar
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
