{% extends 'admin/admin_base.html' %}

{% block content %}

<h2 class="mb-4">Gestión de Pedidos</h2>

<form method="GET" class="mb-4">
    <div class="row">
        <div class="col-md-4">

            <select class="form-select" name="tienda" onchange="this.form.submit()">
                <option value="">
                    Todas las tiendas
                </option>

                {% for tienda in tiendas %}
                    <option value="{{ tienda.tie_id }}" {% if tienda_actual==tienda.tie_id|string %}selected{% endif %}>
                        {{ tienda.tie_nombre }}
                    </option>
                {% endfor %}
            </select>
        
        </div>
    </div>
</form>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Tienda</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        {% for pedido in pedidos %}
        <tr>
            <td>{{ pedido.ped_id }}</td>
            <td>{{ pedido.cliente.cli_nombre }}</td>
            <td>{{ pedido.tienda.tie_nombre }}</td>
            <td>
                <form action="/admin/pedidos/estado/{{ pedido.ped_id }}" method="POST">
                    <select class="form-select form-select-sm" name="estado" onchange="this.form.submit()">

                        <option value="Esperando pago" {% if pedido.ped_estado=="Esperando pago" %}selected{% endif %}>
                            Esperando pago
                        </option>

                        <option value="Pagado" {% if pedido.ped_estado=="Pagado" %}selected{% endif %}>
                            Pagado
                        </option>

                        <option value="Cancelado" {% if pedido.ped_estado=="Cancelado" %}selected{% endif %}>
                            Cancelado
                        </option>

                    </select>
                </form>
            </td>
            <td>{{ pedido.ped_fecha }}</td>
            <td>
                <a href="/admin/pedidos/detalle/{{ pedido.ped_id }}" class="btn btn-info btn-sm">
                    Ver detalle
                </a>
            </td>
        </tr>

        {% endfor %}
    </tbody>
</table>

{% endblock %}
