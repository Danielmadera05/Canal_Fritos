{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header bg-dark text-white text-center">

                    <h3>

                        💳 Pago Seguro

                    </h3>

                </div>

                <div class="card-body p-4">

                    <div class="row">

                        <div class="col-md-6">

                            <h5 class="mb-3">

                                Información del pedido

                            </h5>

                            <p>

                                <strong>Pedido:</strong>

                                #{{ pedido.ped_id }}

                            </p>

                            <p>

                                <strong>Tienda:</strong>

                                {{ pedido.tienda.tie_nombre }}

                            </p>

                            <p>

                                <strong>Total:</strong>

                                ${{ "%.0f"|format(pedido.ped_total) }}

                            </p>

                            <div class="alert alert-warning">

                                <span id="contador">

                                    Tiempo restante

                                </span>

                            </div>

                        </div>

                        <div class="col-md-6">

                            <h5 class="mb-3">

                                Método de pago

                            </h5>

                            <form method="POST" action="/procesar_pago/{{ pedido.ped_id }}">

                                <div class="form-check mb-3">

                                    <input class="form-check-input" type="radio" name="metodo" value="PSE" required>

                                    <label class="form-check-label">

                                        🏦 PSE

                                    </label>

                                </div>

                                <div class="form-check mb-3">

                                    <input class="form-check-input" type="radio" name="metodo" value="Nequi">

                                    <label class="form-check-label">

                                        📱 Nequi

                                    </label>

                                </div>

                                <div class="form-check mb-3">

                                    <input class="form-check-input" type="radio" name="metodo" value="Tarjeta">

                                    <label class="form-check-label">

                                        💳 Tarjeta

                                    </label>

                                </div>

                                <hr>

                                <button class="btn btn-success w-100">

                                    Pagar ahora

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

                <div class="card-footer text-center text-muted">

                    🔒 Pago protegido

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const limite = new Date(
    "{{ pedido.ped_limite_pago.strftime('%Y-%m-%dT%H:%M:%S') }}"
)

function actualizarContador(){

    let ahora = new Date()

    let diferencia = limite-ahora

    if(diferencia<=0){

        document.getElementById(
            "contador"
        ).innerHTML="Tiempo agotado"

        location.reload()

        return

    }

    let minutos=Math.floor(
        diferencia/60000
    )

    let segundos=Math.floor(
        (diferencia%60000)/1000
    )

    document.getElementById(
        "contador"
    ).innerHTML=

    "⏳ Tiempo restante: "
    +minutos+
    "m "
    +segundos+
    "s"

}

actualizarContador()

setInterval(
    actualizarContador,
    1000
)

</script>

{% endblock %}
